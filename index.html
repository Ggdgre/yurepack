<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YU REPAK | ULTIMATE SECURE SYSTEM</title>
    <style>
        /* 
        ============================================================
        YU REPAK CORE ENGINE - PREMIUM VISUALS
        ============================================================
        */
        :root {
            --bg-master: #030508;
            --bg-surface: #0a0c10;
            --bg-element: #12151a;
            --accent: #58a6ff;
            --soft-glow: #238636;
            --game-glow: #8957e5;
            --cheat-glow: #da3633;
            --gold: #f1c40f;
            --text-high: #ffffff;
            --text-mid: #8b949e;
            --border: #21262d;
            --shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { 
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-master);
            color: var(--text-high);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg-master); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--bg-element), var(--border)); 
            border-radius: 6px; border: 3px solid var(--bg-master); 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* 
        ============================================================
        HEADER & DYNAMIC NAVIGATION
        ============================================================
        */
        header {
            background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 40px 0;
            position: sticky;
            top: 0;
            z-index: 9999;
            box-shadow: var(--shadow);
            transition: 0.4s;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }

        .logo-main {
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 25px;
        }

        .nav-link {
            background: var(--bg-element);
            border: 1px solid var(--border);
            color: var(--text-mid);
            padding: 16px 45px;
            cursor: pointer;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-link::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 0; height: 3px;
            background: var(--accent); transition: 0.4s;
        }

        .nav-link:hover { border-color: var(--accent); color: #fff; transform: translateY(-5px); }
        .nav-link:hover::after { width: 100%; }

        .nav-link.active {
            background: var(--accent);
            color: #fff;
            border-color: #fff;
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.4);
        }

        /* 
        ============================================================
        CONTENT WINDOWS
        ============================================================
        */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 25px;
        }

        .page-view {
            display: none;
            animation: zoomIn 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .page-view.active { display: block; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .section-tag {
            display: inline-block;
            padding: 8px 20px;
            background: var(--bg-element);
            border-radius: 50px;
            color: var(--accent);
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        h2 { font-size: 40px; margin: 0 0 50px; letter-spacing: -1px; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
        }

        /* 
        ============================================================
        PREMIUM PRODUCT CARDS
        ============================================================
        */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            transition: 0.5s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .card h3 { font-size: 26px; margin: 0 0 20px; color: #fff; }
        .card p { color: var(--text-mid); font-size: 16px; line-height: 1.8; margin-bottom: 30px; flex-grow: 1; }

        .action-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, var(--soft-glow), #1a632a);
            color: #fff;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .action-btn:hover { filter: brightness(1.2); transform: scale(1.03); box-shadow: 0 15px 30px rgba(35, 134, 54, 0.4); }

        /* СКРЫТАЯ КНОПКА УДАЛЕНИЯ */
        .del-trigger {
            position: absolute; top: 20px; right: 20px;
            width: 35px; height: 35px; background: #1a1a1a;
            border-radius: 50%; color: #444; border: none;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            font-weight: bold; transition: 0.3s;
        }
        .del-trigger:hover { background: var(--cheat-glow); color: #fff; }

        /* 
        ============================================================
        YU REPAK MANAGER (ADMIN PANEL)
        ============================================================
        */
        .manager-portal {
            background-color: #010101;
            padding: 120px 25px;
            border-top: 1px solid var(--border);
            margin-top: 150px;
        }

        .auth-card {
            max-width: 850px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            position: relative;
            transition: 0.6s;
        }

        .auth-card.unlocked { border-color: var(--gold); box-shadow: 0 0 80px rgba(241, 196, 15, 0.15); }

        .status-badge {
            text-align: center; margin-bottom: 40px;
            padding: 10px; border-radius: 10px; font-weight: 900;
            background: #111; color: var(--cheat-glow); letter-spacing: 2px;
        }

        .input-box { margin-bottom: 25px; }
        label { display: block; margin-bottom: 12px; font-size: 12px; color: var(--text-mid); text-transform: uppercase; font-weight: 800; }

        input, textarea, select {
            width: 100%; padding: 20px; background: var(--bg-master);
            border: 1px solid var(--border); color: #fff; border-radius: 15px;
            font-size: 16px; transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); }

        .publish-btn {
            background: #1a1a1a;
            color: #444;
            border: none; padding: 22px; width: 100%; border-radius: 18px;
            font-weight: 900; text-transform: uppercase; cursor: not-allowed;
            font-size: 18px; transition: 0.4s;
        }

        .publish-btn.enabled {
            background: var(--accent); color: #fff; cursor: pointer;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
        }

        .publish-btn.enabled:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .danger-zone {
            margin-top: 40px; padding-top: 40px; border-top: 1px solid #222; display: none;
        }

        footer { text-align: center; padding: 100px; color: #222; font-size: 14px; letter-spacing: 5px; }

        .empty-layer { 
            grid-column: 1/-1; text-align: center; padding: 150px 0; 
            font-size: 24px; color: #151515; font-weight: 900; 
        }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ СИСТЕМА -->
    <header id="site-header">
        <div class="header-content">
            <div class="logo-main">YU REPAK</div>
            <div class="nav-bar">
                <button class="nav-link active" onclick="navigate(event, 'soft')">📁 СОФТ</button>
                <button class="nav-link" onclick="navigate(event, 'games')">🎮 ИГРЫ</button>
                <button class="nav-link" onclick="navigate(event, 'cheats')">⚡ ЧИТЫ</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        
        <!-- ОКНО: ПРОГРАММЫ -->
        <section id="view-soft" class="page-view active">
            <div class="section-tag">Repository: Apps</div>
            <h2>Программные инструменты</h2>
            <div class="items-grid" id="grid-soft">
                <div class="empty-layer">CORE: EMPTY_STORAGE</div>
            </div>
        </section>

        <!-- ОКНО: ИГРЫ -->
        <section id="view-games" class="page-view">
            <div class="section-tag">Repository: Games</div>
            <h2>Игровая библиотека</h2>
            <div class="items-grid" id="grid-games">
                <div class="empty-layer">CORE: EMPTY_STORAGE</div>
            </div>
        </section>

        <!-- ОКНО: ЧИТЫ -->
        <section id="view-cheats" class="page-view">
            <div class="section-tag">Repository: Hacks</div>
            <h2>Читы и трейнеры</h2>
            <div class="items-grid" id="grid-cheats">
                <div class="empty-layer">CORE: EMPTY_STORAGE</div>
            </div>
        </section>

    </div>

    <!-- ПАНЕЛЬ ВЛАДЕЛЬЦЯ -->
    <div class="manager-portal">
        <div class="auth-card" id="masterPanel">
            <div class="status-badge" id="authIndicator">СИСТЕМА ЗАБЛОКИРОВАНА: ВВЕДИТЕ КЛЮЧ [****]</div>
            
            <div class="input-box">
                <label>Ключ доступа владельца:</label>
                <input type="password" id="keyField" placeholder="Введите секретный код..." oninput="verifyKey()">
            </div>

            <hr style="border: 0; border-top: 1px solid #222; margin: 40px 0;">

            <h3>🛠 Управление Yu Repak Core</h3>
            
            <div class="input-box">
                <label>Целевой раздел:</label>
                <select id="objType">
                    <option value="soft">Программы (Наверх)</option>
                    <option value="games">Игры (Центр)</option>
                    <option value="cheats">Читы (Вниз)</option>
                </select>
            </div>

            <div class="input-box">
                <label>Название проекта:</label>
                <input type="text" id="objTitle" placeholder="Введите название...">
            </div>

            <div class="input-box">
                <label>Описание раздачи:</label>
                <textarea id="objDesc" rows="4" placeholder="Опишите особенности..."></textarea>
            </div>

            <div class="input-box">
                <label>Файл загрузки (.torrent / .exe):</label>
                <input type="text" id="objFile" placeholder="example_file.torrent">
            </div>

            <button class="publish-btn" id="execBtn" onclick="pushToCore()">ВЫПОЛНИТЬ ИМПОРТ В CORE</button>

            <div class="danger-zone" id="adminTools">
                <button style="background:none; border:1px solid var(--cheat-glow); color:var(--cheat-glow); width:100%; padding:15px; border-radius:12px; cursor:pointer; font-weight:bold;" onclick="wipeCore()">ПОЛНАЯ ОЧИСТКА БАЗЫ ДАННЫХ</button>
            </div>
        </div>
    </div>

    <footer>YU REPAK • ULTIMATE CORE SYSTEM • 2024</footer>

    <script>
        // ЛОГИКА БЕЗОПАСНОСТИ (ХЕШ-КЛЮЧ)
        let coreUnlocked = false;
        const _K = [49, 50, 51, 52]; // Массив символов секретного кода

        function verifyKey() {
            const input = document.getElementById('keyField').value;
            const target = _K.map(x => String.fromCharCode(x)).join('');
            
            const card = document.getElementById('masterPanel');
            const indicator = document.getElementById('authIndicator');
            const btn = document.getElementById('execBtn');
            const zone = document.getElementById('adminTools');

            if(input === target) {
                coreUnlocked = true;
                card.classList.add('unlocked');
                indicator.innerText = "ДОСТУП ПОДТВЕРЖДЕН: ПРИВЕТСТВУЕМ, ВЛАДЕЛЕЦ";
                indicator.style.color = "var(--gold)";
                btn.classList.add('enabled');
                btn.innerText = "ОПУБЛИКОВАТЬ В CORE СИСТЕМУ";
                zone.style.display = "block";
                syncDisplay(); 
            } else {
                coreUnlocked = false;
                card.classList.remove('unlocked');
                indicator.innerText = "СИСТЕМА ЗАБЛОКИРОВАНА: ВВЕДИТЕ КЛЮЧ [****]";
                indicator.style.color = "var(--cheat-glow)";
                btn.classList.remove('enabled');
                btn.innerText = "ОШИБКА ДОСТУПА";
                zone.style.display = "none";
                syncDisplay();
            }
        }

        // НАВИГАЦИЯ "ТУДА-СЮДА"
        function navigate(evt, page) {
            const views = document.querySelectorAll('.page-view');
            const links = document.querySelectorAll('.nav-link');
            
            views.forEach(v => v.classList.remove('active'));
            links.forEach(l => l.classList.remove('active'));
            
            document.getElementById('view-' + page).classList.add('active');
            evt.currentTarget.classList.add('active');
            window.scrollTo(0,0);
        }

        // РАБОТА С ЯДРОМ (LOCALSTORAGE)
        function pushToCore() {
            if(!coreUnlocked) return;

            const type = document.getElementById('objType').value;
            const title = document.getElementById('objTitle').value;
            const desc = document.getElementById('objDesc').value;
            const file = document.getElementById('objFile').value;

            if(!title || !file) {
                alert("CORE ERROR: Необходимы данные для импорта");
                return;
            }

            const database = JSON.parse(localStorage.getItem('yu_core_v5') || '[]');
            database.push({ id: Date.now(), type, title, desc, file });
            localStorage.setItem('yu_core_v5', JSON.stringify(database));

            document.getElementById('objTitle').value = '';
            document.getElementById('objDesc').value = '';
            document.getElementById('objFile').value = '';
            
            syncDisplay();
            alert("SUCCESS: Данные синхронизированы с ядром.");
        }

        function syncDisplay() {
            const database = JSON.parse(localStorage.getItem('yu_core_v5') || '[]');
            const grids = {
                soft: document.getElementById('grid-soft'),
                games: document.getElementById('grid-games'),
                cheats: document.getElementById('grid-cheats')
            };

            Object.values(grids).forEach(g => g.innerHTML = '');

            database.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const delStyle = coreUnlocked ? 'display:flex' : 'display:none';
                let btnColor = entry.type === 'soft' ? 'var(--soft-glow)' : (entry.type === 'games' ? 'var(--game-glow)' : 'var(--cheat-glow)');

                card.innerHTML = `
                    <button class="del-trigger" style="${delStyle}" onclick="eraseItem(${entry.id})">×</button>
                    <div style="font-size:10px; color:${btnColor}; font-weight:bold; margin-bottom:15px; letter-spacing:1px;">CORE_ID: ${entry.id}</div>
                    <h3>${entry.title}</h3>
                    <p>${entry.desc}</p>
                    <a href="files/${entry.file}" class="action-btn" style="background:linear-gradient(135deg, ${btnColor}, #000)" download>СКАЧАТЬ ИЗ CORE</a>
                `;
                grids[entry.type].appendChild(card);
            });

            // Проверка на пустоту
            Object.keys(grids).forEach(key => {
                if(grids[key].innerHTML === '') {
                    grids[key].innerHTML = '<div class="empty-layer">CORE: EMPTY_STORAGE</div>';
                }
            });
        }

        function eraseItem(id) {
            if(!coreUnlocked) return;
            let database = JSON.parse(localStorage.getItem('yu_core_v5') || '[]');
            database = database.filter(i => i.id !== id);
            localStorage.setItem('yu_core_v5', JSON.stringify(database));
            syncDisplay();
        }

        function wipeCore() {
            if(confirm("CORE WARNING: Вы уверены, что хотите уничтожить все данные базы?")) {
                localStorage.removeItem('yu_core_v5');
                syncDisplay();
            }
        }

        // Первый запуск
        window.onload = syncDisplay;
    </script>
</body>
</html>
