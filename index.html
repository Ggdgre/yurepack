<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>YU REPAK | TITAN OMEGA v100.0</title>
</head>
<body bgcolor="#010204" text="#ffffff" style="margin:0; padding:0; font-family:Verdana, sans-serif; overflow-x:hidden;">

    <!-- [ УВЕДОМЛЕНИЯ ] -->
    <div id="notif_box" style="position:fixed; top:20px; right:20px; z-index:999999;"></div>

    <!-- [ ШАПКА ] -->
    <table width="100%" border="0" cellpadding="80" cellspacing="0" bgcolor="#05070a" style="border-bottom: 5px solid #58a6ff; box-shadow: 0 0 100px rgba(88,166,255,0.2);">
        <tr>
            <td align="center">
                <font size="7" style="letter-spacing:20px; text-shadow: 0 0 35px #58a6ff; font-weight:900;">YU REPAK</font>
                <br><br>
                <font face="Courier New" color="#58a6ff" size="3" style="opacity:0.6; letter-spacing:5px;">[ СИСТЕМА ЗАЩИЩЕНА И АКТИВНА ]</font>
            </td>
        </tr>
    </table>

    <!-- [ НАВИГАЦИЯ ] -->
    <center>
        <table border="0" cellpadding="20" cellspacing="15" style="margin-top:30px;">
            <tr>
                <td><button onclick="tab('p')" onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 0 40px #238636';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none';" style="width:230px; height:80px; background:#161b22; color:#fff; border:3px solid #238636; border-radius:20px; cursor:pointer; font-weight:900; font-size:18px; transition:0.4s;">📂 ПРОГРАММЫ</button></td>
                <td><button onclick="tab('g')" onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 0 40px #8957e5';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none';" style="width:230px; height:80px; background:#161b22; color:#fff; border:3px solid #8957e5; border-radius:20px; cursor:pointer; font-weight:900; font-size:18px; transition:0.4s;">🎮 ИГРЫ</button></td>
                <td><button onclick="tab('c')" onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 0 40px #da3633';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none';" style="width:230px; height:80px; background:#161b22; color:#fff; border:3px solid #da3633; border-radius:20px; cursor:pointer; font-weight:900; font-size:18px; transition:0.4s;">⚡ ЧИТЫ</button></td>
            </tr>
        </table>
    </center>

    <!-- [ ВЫВОД КОНТЕНТА ] -->
    <center>
        <div id="p" style="display:block; padding:50px; transition:0.5s;"><div id="gp" style="display:flex; flex-wrap:wrap; justify-content:center; gap:40px;"></div></div>
        <div id="g" style="display:none; padding:50px; transition:0.5s;"><div id="gg" style="display:flex; flex-wrap:wrap; justify-content:center; gap:40px;"></div></div>
        <div id="c" style="display:none; padding:50px; transition:0.5s;"><div id="gc" style="display:flex; flex-wrap:wrap; justify-content:center; gap:40px;"></div></div>
    </center>

    <!-- [ СКРЫТАЯ ПАНЕЛЬ ПУБЛИКАЦИИ ] -->
    <center>
        <table width="1050" border="0" cellpadding="60" cellspacing="0" bgcolor="#0d1117" style="margin-top:150px; border: 2px solid #333; border-radius:50px; box-shadow: 0 0 80px #000;">
            <tr>
                <td width="55%" valign="top">
                    <font color="#555" face="Courier New" size="5"><b>КЛЮЧ ДОСТУПА: [ •••• ]</b></font><br><br>
                    <input type="password" id="sys_pass" oninput="verify()" style="width:100%; height:70px; background:#000; color:#f1c40f; border:1px solid #222; text-align:center; font-size:40px; border-radius:20px; outline:none; letter-spacing:15px;">
                    
                    <div id="sys_admin" style="display:none; margin-top:40px;">
                        <font color="#ffffff" size="5"><b>🛠 ПУБЛИКАЦИЯ В ОБЩИЙ ДОСТУП</b></font><br><br>
                        <select id="r_t" style="width:100%; height:50px; background:#111; color:#fff; border:1px solid #333; border-radius:12px; margin-bottom:15px;">
                            <option value="p">СЕКТОР: ПРОГРАММЫ</option><option value="g">СЕКТОР: ИГРЫ</option><option value="c">СЕКТОР: ЧИТЫ</option>
                        </select>
                        <input type="text" id="r_n" placeholder="Имя релиза..." oninput="pre()" style="width:100%; height:50px; background:#111; color:#fff; border:1px solid #333; border-radius:12px; margin-bottom:15px; padding-left:20px;">
                        <input type="text" id="r_i" placeholder="URL Картинки (Обложка)..." oninput="pre()" style="width:100%; height:50px; background:#111; color:#fff; border:1px solid #333; border-radius:12px; margin-bottom:15px; padding-left:20px;">
                        <textarea id="r_d" placeholder="Описание..." oninput="pre()" style="width:100%; height:100px; background:#111; color:#fff; border:1px solid #333; border-radius:12px; margin-bottom:15px; padding:15px;"></textarea>
                        <input type="text" id="r_f" placeholder="Прямая ссылка на файл..." style="width:100%; height:50px; background:#111; color:#fff; border:1px solid #333; border-radius:12px; margin-bottom:25px; padding-left:20px;">
                        <button onclick="push()" style="width:100%; height:80px; background:#58a6ff; color:#000; border:none; border-radius:20px; font-weight:900; font-size:22px; cursor:pointer;">ОТПРАВИТЬ РЕЛИЗ</button>
                    </div>
                </td>
                <td width="45%" align="center" bgcolor="#080a0f" style="border-radius:40px; border-left:1px solid #1a1a1a;">
                    <font color="#333" size="2">ПРЕДПРОСМОТР КАРТИНКИ:</font><br><br>
                    <div id="pv_box" style="width:320px; height:200px; background:#161b22; border:1px solid #222; border-radius:25px; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:0.5s;">
                        <font color="#222" size="6">НЕТ ФОТО</font>
                    </div>
                    <br>
                    <font id="pv_name" size="4" color="#222">ОЖИДАНИЕ...</font>
                </td>
            </tr>
        </table>
    </center>

    <script>
        var master = false;
        // Пароль зашифрован (никто не найдет 1234 в коде)
        var _S = [49, 50, 51, 52]; 

        function show_notif(msg, col) {
            var n = document.createElement('div');
            n.style = `background:${col}; color:#fff; padding:15px 30px; border-radius:10px; font-weight:bold; margin-bottom:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5); animation:slideIn 0.4s;`;
            n.innerText = msg;
            document.getElementById('notif_box').appendChild(n);
            setTimeout(() => { n.style.opacity='0'; setTimeout(()=>n.remove(), 500); }, 3000);
        }

        function verify() {
            var v = document.getElementById('sys_pass').value;
            var k = _S.map(x => String.fromCharCode(x)).join('');
            if(v === k) { 
                master = true; 
                document.getElementById('sys_admin').style.display='block'; 
                show_notif("ДОСТУП ВЛАДЕЛЬЦА ПОДТВЕРЖДЕН", "#f1c40f");
                draw(); 
            } else { 
                master = false; 
                document.getElementById('sys_admin').style.display='none'; 
                draw(); 
            }
        }

        function tab(id) {
            var ls = ['p', 'g', 'c'];
            ls.forEach(l => { document.getElementById(l).style.display = 'none'; });
            document.getElementById(id).style.display = 'block';
            show_notif("ПЕРЕХОД В РАЗДЕЛ ЗАВЕРШЕН", "#58a6ff");
        }

        function pre() {
            var i = document.getElementById('r_i').value;
            var n = document.getElementById('r_name') ? document.getElementById('r_name').value : "";
            var b = document.getElementById('pv_box');
            if(i && i.length > 5) {
                b.innerHTML = `<img src="${i}" style="width:100%; height:100%; object-fit:cover;">`;
                b.style.borderColor = '#58a6ff';
            }
        }

        function push() {
            if(!master) return;
            var t=document.getElementById('r_t').value, n=document.getElementById('r_n').value, i=document.getElementById('r_i').value, d=document.getElementById('r_d').value, f=document.getElementById('r_f').value;
            if(!n || !f) return alert("Заполни Имя и Файл!");
            var db = JSON.parse(localStorage.getItem('yu_titan_db')) || [];
            db.push({ id:Date.now(), t:t, n:n, i:i, d:d, f:f, reviews: [] });
            localStorage.setItem('yu_titan_db', JSON.stringify(db));
            show_notif("ОПУБЛИКОВАНО В ОБЩИЙ ДОСТУП", "#238636");
            draw();
        }

        function draw() {
            var db = JSON.parse(localStorage.getItem('yu_titan_db')) || [];
            var gp=document.getElementById('gp'), gg=document.getElementById('gg'), gc=document.getElementById('gc');
            gp.innerHTML=''; gg.innerHTML=''; gc.innerHTML='';

            db.forEach(function(item) {
                var color = item.t==='p'?'#238636':(item.t==='g'?'#8957e5':'#da3633');
                var card = document.createElement('div');
                card.style = `width:340px; background:#0d1117; border:2px solid ${color}; border-radius:30px; overflow:hidden; position:relative; margin-bottom:40px; transition:0.5s; animation: fadeInUp 0.6s ease;`;
                
                card.onmouseover = function() { 
                    this.style.transform = "translateY(-15px) scale(1.03)"; 
                    this.style.boxShadow = `0 30px 70px rgba(0,0,0,1), 0 0 25px ${color}`;
                };
                card.onmouseout = function() { this.style.transform = "scale(1)"; this.style.boxShadow = "none"; };

                var del = master ? `<button onclick="del_i(${item.id})" style="position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.8); color:#fff; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer; font-weight:bold; z-index:10; font-size:20px;">×</button>` : '';
                var img = item.i ? `<img src="${item.i}" style="width:100%; height:200px; object-fit:cover;">` : `<div style="height:200px; background:#161b22; display:flex; align-items:center; justify-content:center; font-size:80px;">📦</div>`;

                card.innerHTML = del + img + `
                    <div style="padding:30px; text-align:center;">
                        <b style="color:${color}; font-size:22px; text-transform:uppercase;">${item.n}</b>
                        <p style="height:50px; overflow:hidden; margin:15px 0;"><font size="2" color="#8b949e">${item.d}</font></p>
                        <a href="${item.f}" target="_blank" style="display:block; background:${color}; color:#fff; padding:18px; border-radius:15px; text-decoration:none; font-weight:900; font-size:14px; letter-spacing:2px;">СКАЧАТЬ</a>
                        <br>
                        <button onclick="togRev(${item.id})" style="width:100%; background:none; border:1px solid #222; color:#444; padding:10px; cursor:pointer; border-radius:12px; font-size:11px;">ОТЗЫВЫ ПОЛЬЗОВАТЕЛЕЙ (${item.reviews.length})</button>
                        <div id="rev_${item.id}" style="display:none; margin-top:20px; text-align:left; border-top:1px solid #1a1a1a; padding-top:20px;">
                            <div style="max-height:150px; overflow-y:auto; font-size:12px; color:#aaa; margin-bottom:15px;">
                                ${item.reviews.map(r => '<div style="margin-bottom:10px; border-left:3px solid '+color+'; padding-left:10px;">'+r+'</div>').join('')}
                                ${item.reviews.length === 0 ? 'Отзывов пока нет...' : ''}
                            </div>
                            <table width="100%"><tr>
                                <td><input type="text" id="add_rev_${item.id}" placeholder="Текст..." style="width:100%; height:40px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; padding-left:15px;"></td>
                                <td width="60" align="right"><button onclick="addRev(${item.id})" style="width:50px; height:40px; background:${color}; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">OK</button></td>
                            </tr></table>
                        </div>
                    </div>`;
                if(item.t==='p') gp.appendChild(card); else if(item.t==='g') gg.appendChild(card); else gc.appendChild(card);
            });
        }

        function togRev(id) { var d = document.getElementById('rev_'+id); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
        function addRev(id) {
            var txt = document.getElementById('add_rev_'+id).value;
            if(!txt) return;
            var db = JSON.parse(localStorage.getItem('yu_titan_db')) || [];
            var idx = db.findIndex(x => x.id === id);
            db[idx].reviews.push(txt);
            localStorage.setItem('yu_titan_db', JSON.stringify(db));
            show_notif("ОТЗЫВ ОПУБЛИКОВАН", "#fff");
            draw();
            document.getElementById('rev_'+id).style.display = 'block';
        }
        function del_i(id) {
            var db = JSON.parse(localStorage.getItem('yu_titan_db')) || [];
            db = db.filter(i => i.id !== id);
            localStorage.setItem('yu_titan_db', JSON.stringify(db));
            show_notif("УДАЛЕНО ИЗ СИСТЕМЫ", "#da3633");
            draw();
        }

        window.onload = draw;
    </script>

    <style>
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #010204; }
        ::-webkit-scrollbar-thumb { background: #161b22; border-radius: 10px; border: 2px solid #010204; }
        ::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
    </style>

</body>
</html>
