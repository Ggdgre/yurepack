<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YU REPAK | ULTIMATE CORE SYSTEM v4.0</title>
    <style>
        /* 
        ========================================
        YU REPAK CORE STYLE ENGINE
        ========================================
        */
        :root {
            --bg-deep: #05070a;
            --bg-panel: #0d1117;
            --bg-card: #161b22;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-purple: #8957e5;
            --accent-red: #da3633;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: #30363d;
            --neon-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        /* Общие сбросы */
        * { box-sizing: border-box; outline: none; }
        body, html { 
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        /* 
        ========================================
        HEADER & NAVIGATION
        ========================================
        */
        header {
            background-color: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 30px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.2));
        }

        .nav-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }

        .nav-btn {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 16px 20px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-btn:hover {
            color: #white;
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            background: #1c2128;
        }

        .nav-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: white;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
        }

        /* 
        ========================================
        MAIN CONTENT AREAS
        ========================================
        */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 80vh;
        }

        .page-window {
            display: none;
            animation: windowOpen 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .page-window.active { display: block; }

        @keyframes windowOpen {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section-header {
            margin-bottom: 40px;
            border-left: 6px solid var(--accent-blue);
            padding-left: 20px;
        }

        .section-header h2 {
            font-size: 36px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ГРИД КАРТОЧЕК */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            background: rgba(255,255,255,0.02);
            border: 2px dashed var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            font-size: 18px;
        }

        /* 
        ========================================
        PREMIUM CARDS
        ========================================
        */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card::after {
            content: ""; position: absolute; top: 0; right: 0; 
            width: 80px; height: 80px;
            background: radial-gradient(circle at top right, rgba(88,166,255,0.1), transparent);
        }

        .card-tag {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            background: #21262d;
            padding: 5px 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: inline-block;
            color: var(--accent-blue);
            width: fit-content;
        }

        .card h3 { margin: 0 0 15px; font-size: 24px; color: #fff; }
        .card p { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-bottom: 25px; flex-grow: 1; }

        .btn-dl {
            display: block;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
            background: var(--accent-blue);
        }

        .btn-dl:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(88, 166, 255, 0.4); }

        .btn-delete {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; color: #444;
            cursor: pointer; font-size: 18px; transition: 0.3s;
            z-index: 10;
        }
        .btn-delete:hover { color: var(--accent-red); }

        /* 
        ========================================
        ADMIN CONTROL CENTER
        ========================================
        */
        .admin-section {
            background-color: #010409;
            border-top: 1px solid var(--border);
            padding: 100px 20px;
            margin-top: 100px;
        }

        .admin-card {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-panel);
            border: 1px solid var(--accent-blue);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 0 50px rgba(88, 166, 255, 0.1);
        }

        .admin-card h3 {
            font-size: 28px; color: #fff; margin-top: 0; text-align: center;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }

        label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }

        input, textarea, select {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent-blue); box-shadow: var(--neon-shadow); }

        .submit-btn {
            grid-column: span 2;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #1f6feb; transform: scale(1.02); }

        .clear-btn {
            background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red);
            padding: 10px; width: 100%; border-radius: 10px; margin-top: 30px; cursor: pointer;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 80px 20px;
            border-top: 1px solid var(--border);
            color: #444;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Особенности разделов */
        .page-soft .card-tag { color: var(--accent-green); }
        .page-soft .btn-dl { background: var(--accent-green); }
        .page-games .card-tag { color: var(--accent-purple); }
        .page-games .btn-dl { background: var(--accent-purple); }
        .page-cheats .card-tag { color: var(--accent-red); }
        .page-cheats .btn-dl { background: var(--accent-red); }
    </style>
</head>
<body>

    <!-- 
    ========================================
    HEADER BAR
    ========================================
    -->
    <header>
        <div class="header-container">
            <div class="logo">YU REPAK</div>
            <div class="nav-grid">
                <button class="nav-btn active" onclick="switchPage(event, 'soft')">📁 Программы</button>
                <button class="nav-btn" onclick="switchPage(event, 'games')">🎮 Игры</button>
                <button class="nav-btn" onclick="switchPage(event, 'cheats')">⚡ Читы</button>
            </div>
        </div>
    </header>

    <!-- 
    ========================================
    MAIN CONTENT
    ========================================
    -->
    <div class="container">
        
        <!-- СТРАНИЦА: ПРОГРАММЫ -->
        <section id="page-soft" class="page-window page-soft active">
            <div class="section-header">
                <h2>Верхний эшелон: Софт</h2>
            </div>
            <div class="grid" id="container-soft">
                <!-- Сюда попадут программы -->
            </div>
        </section>

        <!-- СТРАНИЦА: ИГРЫ -->
        <section id="page-games" class="page-window page-games">
            <div class="section-header">
                <h2>Игровая библиотека</h2>
            </div>
            <div class="grid" id="container-games">
                <!-- Сюда попадут игры -->
            </div>
        </section>

        <!-- СТРАНИЦА: ЧИТЫ -->
        <section id="page-cheats" class="page-window page-cheats">
            <div class="section-header">
                <h2>Инструменты взлома</h2>
            </div>
            <div class="grid" id="container-cheats">
                <!-- Сюда попадут читы -->
            </div>
        </section>

    </div>

    <!-- 
    ========================================
    YU REPAK MANAGER (ADMIN)
    ========================================
    -->
    <div class="admin-section">
        <div class="admin-card">
            <h3>Менеджер Контента Core</h3>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Раздел назначения</label>
                    <select id="inType">
                        <option value="soft">Программы</option>
                        <option value="games">Игры</option>
                        <option value="cheats">Читы / Трейнеры</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Название продукта</label>
                    <input type="text" id="inTitle" placeholder="Напр: Russian Fishing 4">
                </div>

                <div class="form-group full">
                    <label>Краткое описание (Core info)</label>
                    <textarea id="inDesc" rows="3" placeholder="Опишите особенности версии, системные требования или функции..."></textarea>
                </div>

                <div class="form-group full">
                    <label>Путь к файлу / Имя торрента</label>
                    <input type="text" id="inLink" placeholder="files/repack_name.torrent">
                </div>

                <button class="submit-btn" onclick="saveToCore()">Опубликовать в системе</button>
            </div>

            <button class="clear-btn" onclick="hardReset()">Полная очистка системы (Reset)</button>
        </div>
    </div>

    <footer>
        YU REPAK CORE SYSTEM &copy; 2024 | БЕЗ ОШИБОК | 24/7
    </footer>

    <!-- 
    ========================================
    YU REPAK LOGIC ENGINE (JS)
    ========================================
    -->
    <script>
        // Движок переключения страниц
        function switchPage(evt, page) {
            const windows = document.querySelectorAll('.page-window');
            const btns = document.querySelectorAll('.nav-btn');

            windows.forEach(w => w.classList.remove('active'));
            btns.forEach(b => b.classList.remove('active'));

            document.getElementById('page-' + page).classList.add('active');
            evt.currentTarget.classList.add('active');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Система сохранения данных (LocalStorage DB)
        function saveToCore() {
            const type = document.getElementById('inType').value;
            const title = document.getElementById('inTitle').value;
            const desc = document.getElementById('inDesc').value;
            const link = document.getElementById('inLink').value;

            if(!title || !link) {
                alert("Ошибка Core: Заполните название и ссылку!");
                return;
            }

            const id = Date.now();
            const payload = { id, type, title, desc, link };

            let db = JSON.parse(localStorage.getItem('yu_repak_db') || '[]');
            db.push(payload);
            localStorage.setItem('yu_repak_db', JSON.stringify(db));

            // Очистка полей
            document.getElementById('inTitle').value = '';
            document.getElementById('inDesc').value = '';
            document.getElementById('inLink').value = '';

            refreshDisplay();
            alert("Система: Контент успешно синхронизирован!");
        }

        // Рендеринг интерфейса
        function refreshDisplay() {
            const db = JSON.parse(localStorage.getItem('yu_repak_db') || '[]');
            
            const softGrid = document.getElementById('container-soft');
            const gamesGrid = document.getElementById('container-games');
            const cheatsGrid = document.getElementById('container-cheats');

            // Сброс контента
            softGrid.innerHTML = '';
            gamesGrid.innerHTML = '';
            cheatsGrid.innerHTML = '';

            if(db.length === 0) {
                const empty = '<div class="empty-state">Система пуста. Ожидание импорта данных...</div>';
                softGrid.innerHTML = empty;
                gamesGrid.innerHTML = empty;
                cheatsGrid.innerHTML = empty;
                return;
            }

            db.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let btnText = "Скачать программу";
                if(item.type === 'games') btnText = "Скачать игру";
                if(item.type === 'cheats') btnText = "Скачать чит";

                card.innerHTML = `
                    <button class="btn-delete" onclick="removeFromCore(${item.id})">×</button>
                    <div class="card-tag">${item.type}</div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <a href="${item.link}" class="btn-dl" download>${btnText}</a>
                `;

                if(item.type === 'soft') softGrid.appendChild(card);
                if(item.type === 'games') gamesGrid.appendChild(card);
                if(item.type === 'cheats') cheatsGrid.appendChild(card);
            });
        }

        // Удаление элемента
        function removeFromCore(id) {
            let db = JSON.parse(localStorage.getItem('yu_repak_db') || '[]');
            db = db.filter(item => item.id !== id);
            localStorage.setItem('yu_repak_db', JSON.stringify(db));
            refreshDisplay();
        }

        // Полный сброс
        function hardReset() {
            if(confirm("ВНИМАНИЕ: Это удалит ВСЕ данные с вашего сайта безвозвратно. Продолжить?")) {
                localStorage.removeItem('yu_repak_db');
                refreshDisplay();
            }
        }

        // Инициализация системы при загрузке
        window.onload = refreshDisplay;
    </script>
</body>
</html>
